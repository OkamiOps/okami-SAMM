<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OKAMI Maturity — Sign in</title>
<meta name="theme-color" content="#060609">
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="stylesheet" href="./fonts/fonts.css">
<link rel="stylesheet" href="./okami-theme.css">
<style>
  body{ display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ width:min(400px,100%); padding:34px 30px; box-shadow:0 30px 80px -30px rgba(0,0,0,.8); }
  .logo{ height:30px; margin-bottom:26px; display:block; }
  h1{ font-size:20px; margin:0 0 4px; }
  p.sub{ color:var(--ok-fg-mute); font-family:var(--ok-mono); font-size:11px; letter-spacing:.06em; margin:0 0 22px; }
  button{ width:100%; margin-top:22px; }
  .err{ margin-top:14px; min-height:16px; }
</style>
</head>
<body>
  <form class="card ok-card" id="form" autocomplete="on">
    <img class="logo" src="./assets/okami-maturity-on-dark.png" alt="OKAMI Maturity">
    <h1 class="ok-h" id="title">Sign in</h1>
    <p class="sub" id="sub">// owasp samm v2 · maturity</p>
    <label class="ok-label" for="u">Username</label>
    <input class="ok-input" id="u" name="username" autocomplete="username" required>
    <label class="ok-label" for="p">Password</label>
    <input class="ok-input" id="p" name="password" type="password" autocomplete="current-password" required>
    <button class="ok-btn" id="btn" type="submit">Sign in</button>
    <div class="err ok-msg ok-err" id="err"></div>
  </form>
<script>
  var setup = false;
  var $ = function (id) { return document.getElementById(id); };
  var title = $('title'), sub = $('sub'), btn = $('btn'), err = $('err'), form = $('form'), pw = $('p');

  fetch('/api/config').then(function (r) { return r.json(); }).then(function (c) {
    if (c && c.needsSetup) {
      setup = true;
      title.textContent = 'Create admin account';
      sub.textContent = '// first run · set up the administrator';
      btn.textContent = 'Create admin';
      pw.setAttribute('autocomplete', 'new-password');
    }
  }).catch(function () {});

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.textContent = ''; btn.disabled = true;
    var body = { username: $('u').value.trim(), password: pw.value };
    try {
      var res = await fetch(setup ? '/api/auth/setup' : '/api/auth/login', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) { var d = await res.json().catch(function () { return {}; }); throw new Error(d.error || ('HTTP ' + res.status)); }
      location.replace('/');
    } catch (e2) { err.textContent = e2.message; btn.disabled = false; }
  });
</script>
</body>
</html>
