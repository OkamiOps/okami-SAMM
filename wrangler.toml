# Cloudflare Pages — serves the static frontend (public/) and the /api/* proxy
# (functions/). Deploy with:  npx wrangler pages deploy
#
# Set the backend container URL as a Pages variable:
#   npx wrangler pages secret put BACKEND_URL    (or via the Pages dashboard)
name = "okami-samm"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# BACKEND_URL is set per-environment in the Pages dashboard / via wrangler,
# e.g. https://okami-samm.onrender.com  (no trailing slash).
